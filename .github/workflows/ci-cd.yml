name: DevOps CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Validate Code Structure
      run: |
        echo "=== MEMULAI PROSES CI (INTEGRASI) ==="
        if [ -f index.html ]; then
          echo "✔ Sukses: File index.html ditemukan!"
        else
          echo "❌ Error: File index.html hilang!" && exit 1
        fi
        
        if [ -f style.css ]; then
          echo "✔ Sukses: File style.css ditemukan!"
        else
          echo "❌ Error: File style.css hilang!" && exit 1
        fi

    - name: Deploy to GitHub Pages (CD)
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: .
        branch: gh-pages

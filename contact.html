<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rama Portfolio | Hubungi Kami</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
 <body class="contact-page">
     <div class="bg-hologram-layer">
         <div class="hologram-bg-icon tool-html"><i class="fab fa-html5"></i></div>
    <div class="hologram-bg-icon tool-cicd">CICD</div>
    <div class="hologram-bg-icon tool-python"><i class="fab fa-python"></i></div>
    <div class="hologram-bg-icon tool-ads">ADS</div>
    <div class="hologram-bg-icon tool-linux"><i class="fab fa-linux"></i></div>
    <div class="hologram-bg-icon tool-docker"><i class="fab fa-docker"></i></div>
</div>
        <canvas id="starsCanvas"></canvas>

    <header class="navbar">
        <div class="logo">Rama<span>DevOps</span></div>
        <nav class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="portfolio.html">Portfolio & Skill</a>
            <a href="contact.html" class="active">Hubungi</a>
        </nav>
        <div class="hamburger" id="hamburgerMenu">
            <i class="fas fa-bars"></i>
        </div>
    </header>

    <main class="contact-wrapper">
        <div class="form-container-3d">
            <h2 class="fade-out-text">Hubungi Saya</h2>
            <p>Punya proyek impian atau ingin berkolaborasi? Kirimkan pesan Anda sekarang.</p>
            
            <form action="#" method="POST" onsubmit="event.preventDefault(); kirimPesanKeWA();">
    <div class="input-group-3d">
        <label>Nama Lengkap</label>
        <input type="text" id="contactNama" placeholder="Masukkan nama Anda..." required>
    </div>
    <div class="input-group-3d">
        <label>Alamat Email</label>
        <input type="email" id="contactEmail" placeholder="nama@email.com" required>
    </div>
    <div class="input-group-3d">
        <label>Pesan Anda</label>
        <textarea rows="4" id="contactPesan" placeholder="Tuliskan detail kolaborasi..." required></textarea>
    </div>
    <button type="submit" class="btn-submit-3d">Kirim Pesan <i class="fas fa-paper-plane"></i></button>
</form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
